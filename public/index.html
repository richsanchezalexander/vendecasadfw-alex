<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex — VendeCasaDFW</title>
<script>
  window.hsConversationsSettings = { loadImmediately: false };
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

:root {
  --navy: #0C5394;
  --navy-dark: #09152B;
  --blue: #3D85C6;
  --light-blue: #9FC5E8;
  --orange: #E8760A;
  --orange-dark: #d06a08;
  --chat-bg: #F7F9FC;
  --bubble-alex-bg: #FFFFFF;
  --bubble-alex-border: #E0E8F0;
  --bubble-alex-text: #09152B;
  --bubble-user: #E8760A;
  --input-bg: #FFFFFF;
  --input-border: #D0DDE8;
  --input-text: #09152B;
  --input-placeholder: #9FB0C0;
  --muted: #7D8CA5;
  --time-color: #A0B0C0;
  --radius: 18px;
  --typing-dot: #3D85C6;
  --disclaimer-bg: #EEF3F8;
  --disclaimer-text: #7D8CA5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--navy-dark);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

/* ── CHAT WINDOW ── */
.chat-window {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.chat-window.open {
  opacity: 1;
  pointer-events: all;
}

/* ── HERO SECTION ── */
.hero {
  background: var(--navy);
  padding: 18px 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.hero-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Avatar — swap src to a photo URL to use a real image */
.hero-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--light-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Lora', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: white;
  border: 2px solid rgba(255,255,255,0.25);
  overflow: hidden;
  flex-shrink: 0;
}

.hero-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.hero-center {
  text-align: center;
  flex: 1;
}

.hero-name {
  font-family: 'Lora', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: white;
  line-height: 1.2;
}

.hero-role {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.55);
  margin-top: 2px;
  letter-spacing: 0.03em;
}

.hero-tagline {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.75);
  font-style: italic;
  font-family: 'Lora', serif;
  margin-top: 4px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4CAF82;
  animation: pulse 2s infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── MESSAGES AREA ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
  background: var(--chat-bg);
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: #D0DDE8; border-radius: 2px; }

.message {
  display: flex;
  flex-direction: column;
  max-width: 88%;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.alex { align-self: flex-start; }
.message.user { align-self: flex-end; }

.bubble {
  padding: 11px 15px;
  border-radius: var(--radius);
  font-size: 0.88rem;
  line-height: 1.55;
  word-break: break-word;
}

.message.alex .bubble {
  background: var(--bubble-alex-bg);
  color: var(--bubble-alex-text);
  border-bottom-left-radius: 5px;
  border: 1px solid var(--bubble-alex-border);
}

.message.user .bubble {
  background: var(--bubble-user);
  color: white;
  border-bottom-right-radius: 5px;
}

.message-time {
  font-size: 0.65rem;
  color: var(--time-color);
  margin-top: 4px;
  padding: 0 4px;
}

.message.user .message-time { text-align: right; }

/* ── TYPING INDICATOR ── */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 12px 15px;
  background: var(--bubble-alex-bg);
  border-radius: var(--radius);
  border-bottom-left-radius: 5px;
  border: 1px solid var(--bubble-alex-border);
  width: fit-content;
  animation: fadeUp 0.2s ease;
}

.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--typing-dot);
  animation: bounce 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* ── INPUT AREA ── */
.input-area {
  padding: 10px 12px;
  background: var(--input-bg);
  border-top: 1px solid var(--bubble-alex-border);
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  background: var(--chat-bg);
  border: 1px solid var(--input-border);
  border-radius: 22px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  transition: border-color 0.15s;
}

.input-wrap:focus-within {
  border-color: var(--blue);
}

textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--input-text);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem;
  line-height: 1.4;
  resize: none;
  max-height: 100px;
  overflow-y: auto;
}

textarea::placeholder { color: var(--input-placeholder); }

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--orange);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}

.send-btn:hover { background: var(--orange-dark); }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { background: #D0DDE8; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; fill: white; }

/* ── DISCLAIMER ── */
.disclaimer {
  text-align: center;
  font-size: 0.62rem;
  color: var(--disclaimer-text);
  padding: 5px 16px 8px;
  background: var(--disclaimer-bg);
  border-top: 1px solid var(--bubble-alex-border);
}

/* ── API KEY NOTICE ── */
.api-notice {
  background: rgba(232,146,74,0.08);
  border: 1px solid rgba(232,146,74,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: #E8924A;
  margin: 12px;
  line-height: 1.5;
  display: none;
}

.api-notice.visible { display: block; }
</style>
</head>
<body>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">

  <!-- HERO SECTION -->
  <div class="hero">
    <div class="hero-top">
      <!-- Logo left — swap src for actual hosted logo URL -->
      <div style="font-family:'Source Sans 3',sans-serif;font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.08em;text-transform:uppercase;">VendeCasaDFW</div>
      <!-- Avatar right — change inner content to <img src="photo.jpg"> when ready -->
      <div class="hero-avatar">A</div>
    </div>
    <div class="hero-center">
      <div class="hero-name">Alex</div>
      <div class="hero-role">Asesora VendeCasaDFW</div>
      <div class="hero-tagline">Sus opciones, su futuro, su decisión.</div>
    </div>
    <div class="hero-badge">
      <div class="status-dot"></div>
      Disponible ahora
    </div>
  </div>

  <div class="api-notice" id="apiNotice">
    ⚠️ Para activar Alex, configure su API key en el servidor.
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="Escriba su mensaje..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="disclaimer">VendeCasaDFW · Sin costo · Sin compromiso</div>
</div>

<script>
// ─────────────────────────────────────────
// CONFIGURATION
// No API key needed here — handled by Netlify proxy
// ─────────────────────────────────────────
const PROXY_URL = 'https://vendecasadfw-alex.netlify.app/api/chat';

const SYSTEM_PROMPT = `You are Alex, asesora de VendeCasaDFW. You help Spanish-speaking homeowners in the Dallas-Fort Worth area understand their options — whether to sell, rent, or explore other alternatives. You are warm, professional, and trustworthy. You never pressure, never judge, and never make promises you can't keep.

LANGUAGE RULES:
- You speak Spanish, English, or both — follow the user's lead without comment
- Use "usted" consistently — formal but warm
- If the user switches languages mid-conversation, follow naturally
- Keep responses concise — 2-4 sentences maximum per message

OPENING SEQUENCE (follow this exactly for first message):
Start with: "¡Bienvenido! Soy Alex, su asesora en VendeCasaDFW. Puedo hablar español, inglés, o ambos. Puedo ayudarle a entender sus opciones como propietario — si le conviene vender, rentar, o explorar otras alternativas. Todo sin costo y sin compromiso. ¿Es usted propietario de una vivienda en el área de Dallas-Fort Worth?"

BRANCH A — NOT a homeowner:
Say: "Nuestros servicios están diseñados principalmente para propietarios, pero con gusto le escuchamos. ¿Cuál es la situación?"
Listen, respond helpfully within VendeCasaDFW's limits, then offer: "Gracias por compartir esta información. ¿Le parece bien si le contactamos para poder discutir su situación a mayor detalle?"
If yes → collect: name, phone, email (optional), preferred callback time
If no → "Entendemos perfectamente. ¿Hay algo más que quisiera compartir con nosotros antes de terminar?"

BRANCH B — IS a homeowner:
Step 1: "¡Perfecto! Me gustaría hacerle algunas preguntas para entender mejor su situación. ¿Está de acuerdo?"
Step 2: "¿Está considerando algún cambio con su propiedad — venderla, rentarla, o explorar otras opciones?"
Step 3 (always ask): "¿Cuáles son las razones principales por las que está considerando este cambio?"
If vague: "Entiendo. Para poder orientarle mejor, ¿podría contarme un poco más sobre lo que le llevó a considerar este cambio?"

CONTACT COLLECTION (after "why" answer — peak trust moment):
Say: "Gracias por compartir esta información. Para no perder estos detalles, ¿me podría proveer su nombre, número telefónico y correo electrónico (opcional)?"
Then: "Para preparar nuestra conversación y servirle mejor, ¿me puede compartir la dirección de su propiedad?"
Then: "Para agendar esa llamada, ¿cuál es el mejor horario para contactarle?"
If no phone provided — move on without comment, never push.

CATEGORY ROUTING (detect silently from user's "why" answer):

CATEGORY 1 — FINANCIAL STRESS (missed payments, can't afford it, debts, taxes, repairs):
Empathy: "Le entendemos. Estas situaciones son más comunes de lo que se imagina."
Urgency: "¿Qué tan avanzada está esta situación en este momento?"
- Early (1-2 months): "Es aún muy buen momento para considerar opciones. ¿A qué se debe esta situación?"
- Mid (3-6 months): "Es absolutamente necesario explorar sus opciones a la brevedad. Antes de conectarle con uno de nuestros asesores, ¿me podría compartir a qué se debe esta situación?"
- Critical (foreclosure in progress): "Entiendo — y quiero ser honesta con usted: en Texas, este proceso puede moverse muy rápido. Pero mientras no se haya realizado la venta, aún hay opciones. Es importante que uno de nuestros asesores se comunique con usted a la brevedad." → then collect contact info immediately → use URGENT CLOSING.

CATEGORY 2 — LIFE EVENTS (divorce, inheritance, retirement, family change):
"Es natural. Los eventos en nuestra vida cambian nuestras necesidades y opciones. ¿En cuánto tiempo requiere resolver esta situación?"
- Urgente: "Entiendo, actuemos con prontitud entonces. Para poder orientarle mejor, ¿me puede contar un poco más sobre su situación?"
- Tengo tiempo: "Qué bueno que está considerando sus opciones con tiempo — eso le da mucha más flexibilidad. ¿Qué es lo más importante para usted en este proceso?"

CATEGORY 3 — PRACTICAL CHANGES (too big/small, relocation, tenant issues, buying another property):
"Gracias por compartir esta información. Nuestras necesidades y requerimientos cambian con el tiempo. Para entender mejor su situación, ¿cuál es su mayor prioridad en este momento?"

CATEGORY 4 — UNCERTAINTY/EXPLORATION:
"¿Qué le llevó a explorar opciones para su propiedad en este momento?"
Listen for signals → re-route to Category 1, 2, or 3 if detected. If still unclear after 2 exchanges → proceed to contact collection.

CLOSING SEQUENCES:
Standard: "Le agradecemos la oportunidad de orientarle en este proceso tan importante. Cada situación es única y haremos lo posible para diseñar la solución óptima a su conveniencia. Si desea conocer más mientras espera nuestra llamada, aquí puede encontrar más información sobre sus opciones: https://vendecasadfw.com/opciones-para-propietarios-dfw. ¡Hasta pronto!"
Urgent (foreclosure only): "Le contactaremos en las próximas 24 horas. Cada hora cuenta y haremos todo lo posible para ayudarle. ¡Hasta pronto!"

HARD LIMITS:
- Never give legal, financial, or tax advice
- Never say "you can save your home"
- Never say "it's too late"
- Never imply a human is available right now
- Never ask for personal data without explaining why first
- If legal/financial question asked: "Esa es una pregunta importante que merece la atención de uno de nuestros especialistas. ¿Hay alguna otra información que guste compartir con nosotros?" → then proceed to contact collection
- Hard limits never dead-end the conversation — always route to contact collection`;

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let conversationHistory = [];
let isLoading = false;
let chatOpen = false;
let alexStarted = false;

// ─────────────────────────────────────────
// UI CONTROLS
// ─────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chatWindow');
  win.classList.toggle('open', chatOpen);

  if (chatOpen && !alexStarted) {
    alexStarted = true;
    startAlex();
  }
}

function getTime() {
  return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, text) {
  const container = document.getElementById('messages');

  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const linked = escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:#0C5394;text-decoration:underline;">$1</a>');
  bubble.innerHTML = linked;

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = getTime();

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;

  return bubble;
}

function showTyping() {
  const container = document.getElementById('messages');
  const typing = document.createElement('div');
  typing.className = 'message alex';
  typing.id = 'typingIndicator';
  typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function setLoading(val) {
  isLoading = val;
  document.getElementById('sendBtn').disabled = val;
  document.getElementById('userInput').disabled = val;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ─────────────────────────────────────────
// API CALL
// ─────────────────────────────────────────
async function callAlex(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  showTyping();
  setLoading(true);

  try {
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error);

    const reply = data.reply;
    conversationHistory.push({ role: 'assistant', content: reply });

    removeTyping();
    addMessage('alex', reply);

  } catch (err) {
    removeTyping();
    addMessage('alex', 'Disculpe, hubo un problema técnico. Por favor intente de nuevo.');
    console.error('Alex error:', err);
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────
// START ALEX (opening message)
// ─────────────────────────────────────────
async function startAlex() {
  setLoading(true);

  const msg1 = '¡Bienvenido! Soy Alex, su asesora en VendeCasaDFW. Puedo hablar español, inglés, o ambos.';
  const msg2 = 'Estoy aquí para ayudarle con su propiedad — sin costo y sin compromiso. ¿Es propietario en el área de Dallas-Fort Worth?';

  showTyping();
  await new Promise(r => setTimeout(r, 700));
  removeTyping();
  addMessage('alex', msg1);

  await new Promise(r => setTimeout(r, 600));

  showTyping();
  await new Promise(r => setTimeout(r, 800));
  removeTyping();
  addMessage('alex', msg2);

  const fullOpening = msg1 + ' ' + msg2;
  conversationHistory.push({ role: 'user', content: 'START_CONVERSATION' });
  conversationHistory.push({ role: 'assistant', content: fullOpening });

  setLoading(false);
  document.getElementById('userInput').focus();
}

// ─────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  await callAlex(text);
  document.getElementById('userInput').focus();
}

window.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    toggleChat();
  }, 300);
});
</script>

</body>
</html>
